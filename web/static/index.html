<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sigen System Simulator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 2em;
            background: linear-gradient(120deg, #e0e7ff 0%, #f8fafc 100%);
            color: #222;
        }
        h1 {
            color: #0078d7;
            letter-spacing: 1px;
        }
        section {
            margin-bottom: 2em;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px #0001;
            padding: 1.2em 2em 1.2em 1.2em;
        }
        label {
            display: block;
            margin-top: 0.7em;
            font-weight: 500;
        }
        input, select {
            margin-top: 0.2em;
            padding: 0.4em 0.7em;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 1em;
            background: #f1f5f9;
        }
        input:focus, select:focus {
            outline: 2px solid #0078d7;
            background: #fff;
        }
        button[type="submit"] {
            background:#0078d7;color:#fff;padding:0.7em 2em;border:none;border-radius:4px;font-size:1.1em;cursor:pointer;box-shadow:0 2px 6px #0001;
        }
        button[type="submit"]:hover {
            background: #005fa3;
        }
        .result {
            background: #fff;
            padding: 1.5em 2em;
            border-radius: 8px;
            margin-top: 2em;
            box-shadow: 0 2px 8px #0001;
            font-size: 1.1em;
            color: #222;
            display: none;
        }
        .result h3 {
            color: #0078d7;
            margin-top: 0;
        }
        .mode-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1em;
        }
        .mode-table th, .mode-table td {
            border: 1px solid #cbd5e1;
            padding: 0.6em 1em;
            text-align: left;
        }
        .mode-table th {
            background: #e0e7ff;
        }
        .mode-table td.mode-SELF_POWERED { color: #16a34a; font-weight: bold; }
        .mode-table td.mode-AI { color: #0078d7; font-weight: bold; }
        .mode-table td.mode-TOU { color: #f59e42; font-weight: bold; }
        .mode-table td.mode-GRID_EXPORT { color: #e11d48; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Sigen System Simulator</h1>
    <form id="sim-form">
        <section>
            <h2>Inverter</h2>
            <label>Inverter kW: <input type="number" step="0.1" id="inverter_kw" name="inverter_kw"></label>
        </section>
        <section>
            <h2>Battery</h2>
            <label>Battery kWh: <input type="number" step="0.1" id="battery_kwh" name="battery_kwh"></label>
            <label>State of Charge (%): <input type="number" step="1" min="0" max="100" id="soc" name="soc"></label>
        </section>
        <section>
            <h2>Solar Panels</h2>
            <label>Solar PV kW: <input type="number" step="0.1" id="solar_pv_kw" name="solar_pv_kw"></label>
        </section>
        <section>
            <h2>Solar Forecast</h2>
            <label>Morning:
                <select id="forecast_morn" name="forecast_morn">
                    <option value="Green">Green</option>
                    <option value="Amber">Amber</option>
                    <option value="Red">Red</option>
                </select>
            </label>
            <label>Afternoon:
                <select id="forecast_aftn" name="forecast_aftn">
                    <option value="Green">Green</option>
                    <option value="Amber">Amber</option>
                    <option value="Red">Red</option>
                </select>
            </label>
            <label>Evening:
                <select id="forecast_eve" name="forecast_eve">
                    <option value="Green">Green</option>
                    <option value="Amber">Amber</option>
                    <option value="Red">Red</option>
                </select>
            </label>
        </section>
        <button type="submit">Simulate</button>
    </form>
    <div class="result" id="result"></div>
    <script src="script.js"></script>
</body>
</html>
